# Publishes the BETA STEM Ecosystem site (this repo's own copy, in ./site)
# to https://league-infrastructure.github.io/partner-scrape/.
#
# partner-scrape is the beta: the site + scraped data are iterated here.
# stem-ecosystem is production (its own repo/Pages), promoted to when ready.
name: Deploy beta site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ['master']
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'

concurrency:
  group: 'pages'
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build beta site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro (base = /partner-scrape)
        run: |
          npm run build -- \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
