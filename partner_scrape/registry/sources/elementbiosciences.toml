# Element Biosciences -- San Diego HQ biotech (next-generation sequencing
# instrumentation), Greenhouse-backed careers board. Board token
# "elementbiosciences" was confirmed live during sprint 006 planning
# (HTTP 200, valid JSON; 15 jobs, a mix of San Diego and remote/EMEA
# postings -- see sprint.md's Architecture table: "local-filter matters
# here"). This ticket's own implementation pass could not re-run that
# live check itself (no network access in the execution/test
# environment, per this project's offline/hermetic test convention) --
# it re-seeds the planning pass's confirmed token as static config
# unchanged. Operator should re-confirm the board is still reachable
# (``curl -s https://boards-api.greenhouse.io/v1/boards/
# elementbiosciences/jobs``) before fully trusting production output.

org_name = "Element Biosciences"
adapter_type = "greenhouse"
enabled = true

[config]
board_token = "elementbiosciences"
# Element's board mixes local San Diego/La Jolla postings with
# remote/EMEA ones -- ATS location text sometimes reads "La Jolla, CA"
# rather than "San Diego, CA", which the default ["San Diego"] substring
# match alone would miss, and the remote/EMEA postings must still be
# excluded (neither keyword matches "Remote"/EMEA location text).
location_keywords = ["San Diego", "La Jolla"]

[acquisition_policy]
rate_limit_seconds = 1.0
respect_robots = true
discovered_via = "sprint 006 planning (live Greenhouse board-token verification)"
