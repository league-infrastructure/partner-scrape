# EastLake Educational Foundation -- The Events Calendar REST API.
# Endpoint verified working in dev/fetch_tec_api.py's TEC_SITES list.

org_name = "EastLake Educational Foundation"
adapter_type = "tec_rest"
enabled = true

[config]
api_base = "https://eefkids.org/wp-json/tribe/events/v1/events/"
domain = "www.eefkids.org"

[acquisition_policy]
rate_limit_seconds = 1.0
respect_robots = true
discovered_via = "dev/fetch_tec_api.py"
